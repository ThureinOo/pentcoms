<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Terminal window -->
  <rect x="4" y="8" width="56" height="48" rx="4" ry="4" fill="none" stroke="#e74c3c" stroke-width="3"/>
  <!-- Title bar -->
  <line x1="4" y1="18" x2="60" y2="18" stroke="#e74c3c" stroke-width="2"/>
  <!-- Window dots -->
  <circle cx="12" cy="13" r="2" fill="#e74c3c"/>
  <circle cx="19" cy="13" r="2" fill="#e74c3c"/>
  <circle cx="26" cy="13" r="2" fill="#e74c3c"/>
  <!-- Prompt lines -->
  <text x="10" y="32" font-family="monospace" font-size="12" fill="#e74c3c" font-weight="bold">&gt;_</text>
  <!-- Crosshair/target -->
  <circle cx="44" cy="38" r="10" fill="none" stroke="#e74c3c" stroke-width="2"/>
  <circle cx="44" cy="38" r="4" fill="#e74c3c"/>
  <line x1="44" y1="25" x2="44" y2="30" stroke="#e74c3c" stroke-width="2"/>
  <line x1="44" y1="46" x2="44" y2="51" stroke="#e74c3c" stroke-width="2"/>
  <line x1="31" y1="38" x2="36" y2="38" stroke="#e74c3c" stroke-width="2"/>
  <line x1="52" y1="38" x2="57" y2="38" stroke="#e74c3c" stroke-width="2"/>
</svg>
